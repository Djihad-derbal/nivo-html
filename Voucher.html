<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=820"/>
  <title>Travel voucher</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --ink: #0E1E36;
      --ink-soft: #2A3B58;
      --ink-mute: #5E6B82;
      --ink-faint: #8A93A4;
      --gold: #B0823A;
      --gold-deep: #8B6326;
      --line: #E6E8EC;
      --line-strong: #C9CED6;
      --paper: #FFFFFF;
      --cream: #F6F7F9;
      --ok: #4F6B3A;
      --font-sans: "Poppins", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #EEF0F4; }
    body { font-family: var(--font-sans); font-size: 14px; color: var(--ink); -webkit-print-color-adjust: exact; print-color-adjust: exact; line-height: 1.55; font-weight: 400; }

    .toolbar {
      max-width: 820px;
      margin: 24px auto 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
    }
    .toolbar-meta { color: var(--ink-mute); font-size: 12px; letter-spacing: 0.04em; }
    .toolbar-actions { display: flex; gap: 8px; }
    .btn {
      font: inherit;
      cursor: pointer;
      padding: 9px 16px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background: var(--paper);
      color: var(--ink);
      font-size: 13px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      transition: border-color 140ms, background 140ms;
    }
    .btn:hover { border-color: var(--ink); }
    .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
    .btn-primary:hover { background: var(--gold-deep); border-color: var(--gold-deep); }

    .voucher {
      max-width: 820px;
      margin: 0 auto 48px;
      background: var(--paper);
      padding: 56px 64px 56px;
      box-shadow: 0 24px 48px -16px rgba(14,30,54,0.18), 0 8px 20px -8px rgba(14,30,54,0.08);
      border-radius: 4px;
      position: relative;
    }
    .voucher::before {
      /* watermark */
      content: "VOUCHER";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-22deg);
      font-size: 160px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: rgba(14,30,54,0.025);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }
    .voucher > * { position: relative; z-index: 1; }

    .hd {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: end;
      gap: 24px;
      padding-bottom: 22px;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-mark {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%);
      color: #fff;
      border-radius: 6px;
      display: grid; place-items: center;
      font-style: italic;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.02em;
    }
    .brand-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.028em;
      line-height: 1;
    }
    .brand-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-mute);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .doc-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-mute);
      text-align: right;
    }
    .doc-title strong {
      display: block;
      font-size: 16px;
      letter-spacing: -0.018em;
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 600;
      text-transform: none;
      margin-top: 4px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 32px;
      padding-bottom: 26px;
      margin-bottom: 26px;
      border-bottom: 1px solid var(--line);
    }
    .hero h1 {
      margin: 0 0 4px;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.028em;
      line-height: 1.05;
    }
    .hero h1 em { color: var(--gold-deep); font-style: italic; }
    .hero .eyebrow {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 8px;
    }
    .ref-block {
      text-align: right;
      padding: 14px 18px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--cream);
      min-width: 230px;
    }
    .ref-block .lbl {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .ref-block .v {
      font-family: var(--font-mono);
      font-size: 18px;
      letter-spacing: 0.04em;
      font-weight: 500;
      color: var(--ink);
      margin-top: 4px;
    }
    .ref-block .status {
      display: inline-block;
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ok);
      font-weight: 500;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px 32px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px 28px; }
    .field .lbl {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 4px;
    }
    .field .v { font-size: 14px; }
    .field .v.mono { font-family: var(--font-mono); }

    .section {
      margin-top: 32px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }
    .section > h2 {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin: 0 0 16px;
      font-family: var(--font-mono);
    }

    .itin {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .leg {
      display: grid;
      grid-template-columns: 32px 64px 1fr 1.4fr;
      gap: 14px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px dashed var(--line);
    }
    .leg-photo {
      width: 64px;
      height: 48px;
      border-radius: 6px;
      background-size: cover;
      background-position: center;
      background-color: var(--cream);
      border: 1px solid var(--line);
    }
    .leg:last-child { border-bottom: none; }
    .leg-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--ink);
      color: #fff;
      display: grid; place-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
    }
    .leg-city { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
    .leg-nights {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-mute);
      letter-spacing: 0.06em;
    }
    .leg-hotel { font-size: 13.5px; }
    .leg-hotel .stars { color: var(--gold); margin-right: 6px; }

    table.manifest {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.manifest th, table.manifest td {
      text-align: left;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
    }
    table.manifest th {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
      font-weight: 500;
    }
    table.manifest tbody tr:last-child td { border-bottom: none; }
    .pax-num { font-family: var(--font-mono); color: var(--ink-mute); font-size: 11px; }

    .price-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--line);
      align-items: baseline;
      font-size: 13.5px;
    }
    .price-row .qty { font-family: var(--font-mono); font-size: 12px; color: var(--ink-mute); min-width: 60px; text-align: right; }
    .price-row .amount { font-family: var(--font-mono); font-size: 13px; min-width: 130px; text-align: right; }
    .price-grand {
      margin-top: 8px;
      padding-top: 12px;
      border-top: 2px solid var(--ink);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: baseline;
    }
    .price-grand .lbl {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .price-grand .amount {
      font-family: var(--font-mono);
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .terms {
      margin-top: 28px;
      padding: 18px 20px;
      background: var(--cream);
      border-radius: 8px;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--ink-mute);
      line-height: 1.65;
    }
    .terms strong { color: var(--ink); font-weight: 500; }

    .ft {
      margin-top: 36px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--ink-faint);
    }
    .ft-brand {
      font-family: var(--font-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .ft-stamp {
      font-family: var(--font-mono);
      color: var(--ink-mute);
    }

    /* Issued-to / issued-by panels */
    .party-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 26px;
    }
    .party {
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--cream);
    }
    .party.issued-by {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .party .head {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.72;
      margin-bottom: 10px;
    }
    .party .name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.022em;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .party .meta {
      font-size: 12.5px;
      line-height: 1.55;
      opacity: 0.78;
    }
    .party .badge-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .party .badge-row .lead {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* Flight cards */
    .flight {
      display: grid;
      grid-template-columns: 90px 1fr 60px 1fr 90px;
      gap: 18px;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      margin-bottom: 10px;
    }
    .flight .stamp {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .flight .stamp strong {
      display: block;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.005em;
      text-transform: none;
      color: var(--ink);
      margin-top: 4px;
    }
    .flight .city .code {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1;
    }
    .flight .city .name {
      font-size: 11.5px;
      color: var(--ink-mute);
      margin-top: 4px;
      letter-spacing: 0.02em;
    }
    .flight .arrow {
      text-align: center;
      color: var(--gold);
      font-size: 16px;
    }
    .flight .time {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--ink);
      text-align: center;
    }
    .flight .time-label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
      text-align: center;
      margin-top: 4px;
    }
    .flight .date {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ink-mute);
      text-align: right;
    }

    /* Hotel detail cards (vs the compact itin) */
    .hotel-card-v {
      display: grid;
      grid-template-columns: 84px 1.4fr 1fr 1fr;
      gap: 16px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      margin-bottom: 10px;
    }
    .hotel-card-v .photo {
      width: 84px;
      height: 72px;
      border-radius: 6px;
      background-size: cover;
      background-position: center;
      background-color: var(--cream);
      border: 1px solid var(--line);
    }
    .hotel-card-v .h-name {
      font-size: 14.5px;
      font-weight: 500;
      letter-spacing: -0.005em;
    }
    .hotel-card-v .h-stars {
      font-size: 11.5px;
      color: var(--gold);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .hotel-card-v .h-addr {
      font-size: 11.5px;
      color: var(--ink-mute);
      line-height: 1.45;
      margin-top: 6px;
    }
    .hotel-card-v .h-phone {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .hotel-card-v .h-stay .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11.5px;
      padding: 2px 0;
    }
    .hotel-card-v .h-stay .lbl {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .hotel-card-v .h-stay .v {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--ink);
    }
    .hotel-card-v .h-nights {
      text-align: right;
    }
    .hotel-card-v .h-nights .n {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1;
    }
    .hotel-card-v .h-nights .label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-top: 4px;
    }

    /* Passenger manifest table */
    table.pax-manifest {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    table.pax-manifest th {
      text-align: left;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line-strong);
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mute);
      font-weight: 500;
      background: var(--cream);
    }
    table.pax-manifest td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }
    table.pax-manifest tbody tr:last-child td { border-bottom: none; }
    table.pax-manifest .num {
      font-family: var(--font-mono);
      color: var(--ink-mute);
      font-size: 11px;
      width: 36px;
    }
    table.pax-manifest .role-tag {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      color: var(--ink-mute);
    }
    table.pax-manifest .role-tag.adult { color: var(--ink-soft); }
    table.pax-manifest .role-tag.child { color: var(--gold-deep); border-color: var(--gold-soft); }
    table.pax-manifest .mono {
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    .empty-state {
      max-width: 560px;
      margin: 120px auto;
      padding: 40px;
      background: #fff;
      border-radius: 8px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .empty-state h2 { font-weight: 600; letter-spacing: -0.022em; margin: 0 0 8px; }
    .empty-state p { color: var(--ink-mute); margin: 0; }

    @media print {
      html, body { background: #fff; }
      .toolbar { display: none; }
      .voucher { box-shadow: none; margin: 0 auto; padding: 32px 40px; max-width: none; }
      .voucher::before { color: rgba(14,30,54,0.03); }
      @page { size: A4; margin: 16mm; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-meta" id="toolbar-meta">Loading…</div>
    <div class="toolbar-actions">
      <button class="btn" onclick="window.close()">Close</button>
      <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
    </div>
  </div>

  <div id="root"></div>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="masriva-data.jsx?v=8"></script>
  <script type="text/babel">
    function getParam(name) {
      const u = new URLSearchParams(window.location.search);
      return u.get(name);
    }
    function escape(s) { return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
    function initials(name) {
      return (name || "").split(/\s+/).map(w => w[0] || "").join("").slice(0, 2).toUpperCase();
    }
    function agencyEmail(agency) {
      const slug = (agency?.name || "agency").toLowerCase().replace(/[^a-z]+/g, "");
      return `bookings@${slug || "agency"}.com`;
    }
    function agencyCity(agency) {
      // Mock: derive a city from the country code so the letterhead address
      // doesn't read as a generic country line.
      const m = {
        "Algeria": "Algiers",
        "Tunisia": "Tunis",
        "Morocco": "Casablanca",
        "Egypt": "Cairo",
        "Libya": "Tripoli",
        "Mauritania": "Nouakchott",
      };
      return m[agency?.country] || (agency?.country || "");
    }
    function addDays(dateStr, n) {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return "—";
      d.setDate(d.getDate() + (n || 0));
      return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"2-digit", year:"numeric" });
    }
    function addDaysShort(dateStr, n) {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return "—";
      d.setDate(d.getDate() + (n || 0));
      return d.toLocaleDateString("en-US", { month:"short", day:"2-digit" });
    }
    function computeReturn(instance) {
      if (!instance?.departure) return "—";
      const nights = (instance.segments || []).reduce((s, x) => s + (x.nights || 0), 0);
      const d = new Date(instance.departure);
      if (isNaN(d.getTime())) return "—";
      d.setDate(d.getDate() + nights);
      return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"2-digit", year:"numeric" });
    }

    // ── Deterministic passenger generator ──────────────────────────
    // The B2B side persists only pax counts, not the names. We regenerate a
    // plausible roster keyed by booking.ref so the same voucher always lists
    // the same people. The lead seat (#1) is always the agency lead from the
    // booking record.
    const FIRST_NAMES = ["Yacine","Amina","Karim","Nora","Sami","Hafsa","Mehdi","Rania","Tarek","Lila","Adel","Sofia","Ilyes","Yasmine","Anis","Salma","Bilal","Imen","Reda","Kahina"];
    const LAST_NAMES  = ["Belaïd","Ould-Ali","Belkacem","Haddad","Brahimi","Mansouri","Cherif","Saadi","Ziani","Bouzid","Reza","Khelifi","Bensaid","Ait-Ali","Kebir","Meriem","Saidi","Touati","Bouchareb","Hammoudi"];
    function makeRng(seed) {
      let s = seed >>> 0;
      return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    }
    function passengerList(booking) {
      const seed = (booking.ref || "").split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) || 1;
      const rng = makeRng(seed);
      const list = [];
      const total = (booking.pax?.adults || 0) + (booking.pax?.children || 0);
      for (let i = 0; i < (booking.pax?.adults || 0); i++) {
        const fn = FIRST_NAMES[Math.floor(rng() * FIRST_NAMES.length)];
        const ln = LAST_NAMES[Math.floor(rng() * LAST_NAMES.length)];
        const name = i === 0 ? (booking.lead || `${fn} ${ln}`) : `${fn} ${ln}`;
        const passLetters = String.fromCharCode(65 + Math.floor(rng() * 26)) + String.fromCharCode(65 + Math.floor(rng() * 26));
        const passNum = 100000 + Math.floor(rng() * 900000);
        const year = 1970 + Math.floor(rng() * 30);
        const month = 1 + Math.floor(rng() * 12);
        const day = 1 + Math.floor(rng() * 28);
        list.push({
          name,
          role: "adult",
          passport: `${passLetters}${passNum}`,
          nationality: "Algerian",
          dob: `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`,
        });
      }
      for (let i = 0; i < (booking.pax?.children || 0); i++) {
        const fn = FIRST_NAMES[Math.floor(rng() * FIRST_NAMES.length)];
        const ln = LAST_NAMES[Math.floor(rng() * LAST_NAMES.length)];
        const passLetters = String.fromCharCode(65 + Math.floor(rng() * 26)) + String.fromCharCode(65 + Math.floor(rng() * 26));
        const passNum = 100000 + Math.floor(rng() * 900000);
        const year = 2015 + Math.floor(rng() * 8);
        const month = 1 + Math.floor(rng() * 12);
        const day = 1 + Math.floor(rng() * 28);
        list.push({
          name: `${fn} ${ln}`,
          role: "child",
          passport: `${passLetters}${passNum}`,
          nationality: "Algerian",
          dob: `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`,
        });
      }
      return list;
    }

    // ── Hotel / flight mock helpers ────────────────────────────────
    function hotelAddress(hotel) {
      const m = {
        "Cairo": "Plot 12, Pyramids Road · Giza, Cairo, Egypt",
        "Sharm el-Sheikh": "Naama Bay Promenade · Sharm el-Sheikh, South Sinai",
        "Hurghada": "Sahl Hasheesh Bay · Hurghada, Red Sea",
        "Luxor": "Corniche el-Nil · Luxor, Upper Egypt",
      };
      return m[hotel?.city] || `${hotel?.city || ""}, Egypt`;
    }
    function hotelPhone(hotel) {
      const seed = (hotel?.id || "x").split('').reduce((s,c)=>s+c.charCodeAt(0),0);
      const a = String(50 + (seed % 50)).padStart(2,'0');
      const b = String(1000 + (seed % 9000));
      const c = String(1000 + ((seed * 7) % 9000));
      return `+20 ${a} ${b} ${c}`;
    }
    const AIRPORTS = { "Cairo":"CAI", "Sharm el-Sheikh":"SSH", "Sharm":"SSH", "Hurghada":"HRG", "Luxor":"LXR" };
    function flightSchedule(instance) {
      if (!instance?.departure) return null;
      const dep = new Date(instance.departure);
      const nights = (instance.segments || []).reduce((s, x) => s + (x.nights || 0), 0);
      const ret = new Date(dep); ret.setDate(ret.getDate() + nights);
      const dir = instance.direction || "Cairo → Sharm";
      const firstCity = dir.split("→")[0].trim();
      const lastCity  = dir.split("→").slice(-1)[0].trim();
      const firstAirport = AIRPORTS[firstCity] || AIRPORTS[firstCity.replace("Sharm","Sharm el-Sheikh")] || "CAI";
      const lastAirport  = AIRPORTS[lastCity]  || AIRPORTS[lastCity.replace("Sharm","Sharm el-Sheikh")]  || "CAI";
      return [
        { label: "Outbound", airline: "Air Algérie", no: "AH 4040", from: "Algiers ALG", to: `${firstCity} ${firstAirport}`, depTime: "09:45", arrTime: "12:55", date: dep.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"2-digit", year:"numeric" }) },
        { label: "Return",   airline: "Air Algérie", no: "AH 4041", from: `${lastCity} ${lastAirport}`,  to: "Algiers ALG", depTime: "14:30", arrTime: "17:45", date: ret.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"2-digit", year:"numeric" }) },
      ];
    }

    function renderEmpty(message) {
      document.getElementById("root").innerHTML =
        `<div class="empty-state"><h2>Voucher unavailable</h2><p>${escape(message)}</p></div>`;
      document.getElementById("toolbar-meta").textContent = "—";
    }

    function renderVoucher() {
      const ref = getParam("ref");
      if (!ref) return renderEmpty("No booking reference provided in the URL.");
      const booking = window.BOOKINGS?.find(b => b.ref === ref);
      if (!booking) return renderEmpty("No booking found for reference " + ref + ".");
      const instance = window.instanceById?.(booking.instanceId);
      const template = instance ? window.templateById?.(instance.templateId) : null;
      // Use the branded view (accent / accentDeep / logo / tagline) so the
      // voucher renders in the issuing agency's colours.
      const agency = (window.agencyWithBrand?.(booking.agencyId)) || window.agencyById?.(booking.agencyId);
      const hotels = (instance?.assigned || []).map(a => window.hotelById?.(a.hotelId)).filter(Boolean);
      // Group hotels by city using the instance segments order
      const hotelsByCity = {};
      hotels.forEach(h => { (hotelsByCity[h.city] = hotelsByCity[h.city] || []).push(h); });
      const issued = new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });

      const tripName = template?.name || "—";
      const tripWithEm = tripName.includes(" + ")
        ? tripName.split(" + ").map((p, i, a) => i < a.length - 1 ? `${escape(p)} <em>+</em> ` : escape(p)).join("")
        : escape(tripName);

      const lineRows = [
        { lbl: "Adults",   n: booking.pax.adults,   note: "full-stay rate" },
        { lbl: "Children", n: booking.pax.children, note: "child rate" },
      ].filter(r => r.n > 0);

      // Derived data for the new pro voucher.
      const pax = passengerList(booking);
      const flights = flightSchedule(instance) || [];
      // Per-segment check-in / check-out computed from instance.departure + cumulative nights.
      const segments = instance?.segments || [];
      const segStays = segments.map((seg, i) => {
        const offsetIn  = segments.slice(0, i).reduce((s, x) => s + (x.nights || 0), 0);
        const offsetOut = offsetIn + (seg.nights || 0);
        return {
          seg,
          checkIn:  instance?.departure ? addDays(instance.departure, offsetIn) : "—",
          checkOut: instance?.departure ? addDays(instance.departure, offsetOut) : "—",
          hotel: (hotelsByCity[seg.city] || [])[0] || null,
        };
      });
      const totalNights = segments.reduce((s, x) => s + (x.nights || 0), 0);

      document.getElementById("toolbar-meta").textContent =
        `Voucher · ${ref} · Issued ${issued}`;

      // White-label CSS — every `var(--gold*)` reference now pulls the agency's
      // accent. Applied on the .voucher root so other voucher instances in the
      // same tab (rare) stay independent.
      const accent = agency?.accent || "#B0823A";
      const accentDeep = agency?.accentDeep || "#8B6326";
      document.getElementById("root").innerHTML = `
        <article class="voucher" style="--gold:${accent}; --gold-deep:${accentDeep}; --gold-soft:${accent}33;">
          <header class="hd" style="border-bottom-color:${accent};">
            <div class="brand">
              ${agency?.logo
                ? `<img src="${agency.logo}" alt="${escape(agency.name || "Agency")} logo" style="width:40px; height:40px; border-radius:6px; object-fit:cover; background:${accent};"/>`
                : `<div class="brand-mark" style="background:linear-gradient(135deg, ${accent} 0%, ${accentDeep} 100%);">${escape(initials(agency?.name) || "AG")}</div>`
              }
              <div>
                <div class="brand-name">${escape(agency?.name || "Partner agency")}</div>
                <div class="brand-sub">${agency?.tagline ? escape(agency.tagline) : escape(agencyCity(agency)) + (agency?.country ? " · " + escape(agency.country) : "") + (agency?.joined ? " · est. " + escape(agency.joined) : "")}</div>
              </div>
            </div>
            <div></div>
            <div class="doc-title">
              Travel Voucher
              <strong>Original copy</strong>
            </div>
          </header>

          <div class="hero">
            <div>
              <div class="eyebrow">Issued on ${escape(issued)}</div>
              <h1>${tripWithEm}</h1>
              <div style="color:var(--ink-mute); margin-top:6px; font-size:13.5px;">
                ${escape(template?.blurb || "")}
              </div>
            </div>
            <div class="ref-block">
              <div style="display:flex; gap:14px; align-items:flex-start;">
                <div style="flex:1; min-width:0;">
                  <div class="lbl">Booking Reference</div>
                  <div class="v">${escape(ref)}</div>
                  <div class="status">● ${escape((window.statusLabel?.(booking.status)) || booking.status)}</div>
                </div>
                <img
                  src="https://api.qrserver.com/v1/create-qr-code/?size=72x72&margin=0&data=${encodeURIComponent(ref)}"
                  alt="Booking ${escape(ref)} QR code"
                  width="72" height="72"
                  style="width:72px; height:72px; border:1px solid var(--line); border-radius:6px; background:#fff; padding:4px; flex-shrink:0;"/>
              </div>
            </div>
          </div>

          <!-- Issued to the lead traveller, by the agency -->
          <div class="party-row">
            <div class="party">
              <div class="head">Issued to</div>
              <div class="name">${escape(booking.lead || "Group lead")}</div>
              <div class="meta">
                Group leader · ${booking.pax.adults} adults · ${booking.pax.children} children<br/>
                Travelling on behalf of <strong style="color:var(--ink);">${escape(agency?.name || "the agency")}</strong><br/>
                ${escape(agency?.country || "")}
              </div>
              <div class="badge-row">
                <span class="lead">Booking ref</span>
                <span style="font-family:var(--font-mono); font-size:12.5px; font-weight:500; letter-spacing:0.04em;">${escape(ref)}</span>
              </div>
            </div>
            <div class="party issued-by" style="background:${accentDeep}; border-color:${accentDeep};">
              <div class="head">Issued by</div>
              <div class="name">${escape(agency?.name || "Partner agency")}</div>
              <div class="meta">
                ${escape(agencyCity(agency))}${agency?.country ? ", " + escape(agency.country) : ""}<br/>
                ${escape(agency?.contact || "")}<br/>
                ${escape(agencyEmail(agency))}${agency?.joined ? " · est. " + escape(agency.joined) : ""}<br/>
                Issued on ${escape(issued)}
              </div>
            </div>
          </div>

          <div class="grid-3" style="margin-top:22px;">
            <div class="field"><div class="lbl">Departure</div><div class="v">${escape(instance?.departure || "—")}</div></div>
            <div class="field"><div class="lbl">Return</div><div class="v">${escape(computeReturn(instance))}</div></div>
            <div class="field"><div class="lbl">Direction</div><div class="v">${escape(instance?.direction || "—")}</div></div>
          </div>
          <div class="grid-3" style="margin-top:18px;">
            <div class="field"><div class="lbl">Travellers</div><div class="v">${booking.pax.adults} adults · ${booking.pax.children} children</div></div>
            <div class="field"><div class="lbl">Total nights</div><div class="v">${totalNights}</div></div>
            <div class="field"><div class="lbl">Booking status</div><div class="v">${escape((window.statusLabel?.(booking.status)) || booking.status)}</div></div>
          </div>

          <!-- Flight schedule -->
          <section class="section">
            <h2>Flights</h2>
            ${flights.map(f => `
              <div class="flight">
                <div class="stamp">${escape(f.label)}<strong>${escape(f.airline)}</strong><span style="font-family:var(--font-mono); font-size:10.5px; color:var(--ink-mute);">${escape(f.no)}</span></div>
                <div class="city">
                  <div class="code">${escape(f.from.split(" ").slice(-1)[0])}</div>
                  <div class="name">${escape(f.from)}</div>
                  <div class="time-label" style="margin-top:6px;">Depart</div>
                  <div class="time" style="text-align:left;">${escape(f.depTime)}</div>
                </div>
                <div class="arrow">→</div>
                <div class="city">
                  <div class="code">${escape(f.to.split(" ").slice(-1)[0])}</div>
                  <div class="name">${escape(f.to)}</div>
                  <div class="time-label" style="margin-top:6px;">Arrive</div>
                  <div class="time" style="text-align:left;">${escape(f.arrTime)}</div>
                </div>
                <div class="date">${escape(f.date)}</div>
              </div>
            `).join("")}
            <div style="font-size:11px; color:var(--ink-mute); margin-top:6px;">
              Times shown in local airport time. Reconfirm flight details with the airline 48 hours before departure.
            </div>
          </section>

          <!-- Passenger manifest -->
          <section class="section">
            <h2>Passenger manifest</h2>
            <table class="pax-manifest">
              <thead>
                <tr>
                  <th class="num">#</th>
                  <th>Full name</th>
                  <th>Passport</th>
                  <th>Nationality</th>
                  <th>Date of birth</th>
                  <th>Type</th>
                </tr>
              </thead>
              <tbody>
                ${pax.map((p, i) => `
                  <tr>
                    <td class="num">${String(i+1).padStart(2,'0')}</td>
                    <td>${escape(p.name)}</td>
                    <td class="mono">${escape(p.passport)}</td>
                    <td>${escape(p.nationality)}</td>
                    <td class="mono">${escape(p.dob)}</td>
                    <td><span class="role-tag ${p.role}">${p.role === "child" ? "Child" : "Adult"}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
            <div style="font-size:11px; color:var(--ink-mute); margin-top:8px;">
              Names exactly as in passports. Any mismatch will be flagged at airline check-in.
            </div>
          </section>

          <!-- Day-by-day program -->
          ${(() => {
            const program = window.templateProgram?.(template?.id) || [];
            if (program.length === 0) return "";
            return `
              <section class="section">
                <h2>Day-by-day program</h2>
                <div style="display:flex; flex-direction:column; gap:10px;">
                  ${program.map(d => `
                    <div style="display:grid; grid-template-columns:42px 1fr; gap:14px; align-items:start; padding:10px 0; border-bottom:1px dashed var(--line);">
                      <div style="text-align:center;">
                        <div style="font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-mute);">Day</div>
                        <div style="font-family:var(--font-mono); font-size:18px; font-weight:600; color:var(--ink); line-height:1.1; margin-top:2px;">${d.day}</div>
                      </div>
                      <div>
                        <div style="font-size:13.5px; font-weight:500; letter-spacing:-0.005em; color:var(--ink);">${escape(d.title || "")}</div>
                        ${d.description ? `<div style="font-size:12px; color:var(--ink-mute); line-height:1.5; margin-top:3px;">${escape(d.description)}</div>` : ""}
                      </div>
                    </div>
                  `).join("")}
                </div>
              </section>
            `;
          })()}

          <!-- Hotel-by-hotel detail (address, check-in, check-out, phone) -->
          <section class="section">
            <h2>Accommodation</h2>
            ${segStays.map((s) => `
              <div class="hotel-card-v">
                <div class="photo" style="background-image:url('${s.hotel?.photo || ""}')"></div>
                <div>
                  <div class="h-name">${s.hotel ? escape(s.hotel.name) : "Hotel to be confirmed"}</div>
                  <div class="h-stars">${s.hotel ? "★".repeat(s.hotel.stars) + "☆".repeat(5 - s.hotel.stars) : ""} ${s.hotel?.id ? "<span style='color:var(--ink-mute); margin-left:6px;'>" + escape(s.hotel.id.replace(/^h-/, "").toUpperCase()) + "</span>" : ""}</div>
                  <div class="h-addr">${s.hotel ? escape(hotelAddress(s.hotel)) : ""}</div>
                  <div class="h-phone">${s.hotel ? escape(hotelPhone(s.hotel)) : ""}</div>
                </div>
                <div class="h-stay">
                  <div class="row"><span class="lbl">Check-in</span><span class="v">${escape(s.checkIn)}</span></div>
                  <div class="row"><span class="lbl">Check-out</span><span class="v">${escape(s.checkOut)}</span></div>
                  <div class="row"><span class="lbl">After</span><span class="v">14:00</span></div>
                </div>
                <div class="h-nights">
                  <div class="n">${s.seg.nights}</div>
                  <div class="label">nights · ${escape(s.seg.city)}</div>
                </div>
              </div>
            `).join("")}
          </section>

          <!-- Price summary -->
          <section class="section">
            <h2>Price summary</h2>
            ${lineRows.map(r => `
              <div class="price-row">
                <div>${escape(r.lbl)}<span style="color:var(--ink-mute); margin-left:8px; font-size:12px;">${escape(r.note)}</span></div>
                <div class="qty">× ${r.n}</div>
                <div class="amount">${window.fmtCur ? window.fmtCur(Math.round(booking.total / Math.max(1, (booking.pax.adults || 0) + (booking.pax.children || 0)))) : "—"}</div>
              </div>
            `).join("")}
            <div class="price-grand">
              <div class="lbl">Total ${booking.status === "hold" ? "on hold" : "held"} (DZD)</div>
              <div class="amount">${window.fmtCur ? window.fmtCur(booking.total) : booking.total}</div>
            </div>
          </section>

          <div class="terms">
            <strong>Conditions.</strong> This voucher is the proof of booking. Present it at hotel check-in alongside a valid passport. Cancellations within 14 days of departure are non-refundable. Hotel assignments may change with same-tier alternates at the agency's discretion. Issued by <strong>${escape(agency?.name || "the partner agency")}</strong>.
          </div>

          <section class="section" style="page-break-inside: avoid;">
            <h2>Authorisation</h2>
            <div class="grid-2" style="gap: 36px 32px;">
              <div>
                <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:36px;">Authorised signature</div>
                <div style="border-bottom:1px solid var(--ink); height:1px; margin-bottom:8px;"></div>
                <div style="color:var(--ink-mute); font-size:11px;">
                  ${escape(agency?.name || "Partner agency")}<br/>
                  ${escape(agency?.contact || "")}
                </div>
              </div>
              <div>
                <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:36px;">Agency stamp</div>
                <div style="
                  border: 1.5px dashed var(--line-strong);
                  border-radius: 8px;
                  height: 70px;
                  display: grid;
                  place-items: center;
                  color: var(--ink-faint);
                  font-family: var(--font-mono);
                  font-size: 10px;
                  letter-spacing: 0.18em;
                  text-transform: uppercase;
                ">Stamp here</div>
              </div>
            </div>
          </section>

          <div class="ft">
            <div class="ft-brand">${escape((agency?.name || "Travel agency").toUpperCase())}${agency?.country ? " · " + escape(agency.country.toUpperCase()) : ""}</div>
            <div class="ft-stamp">Voucher #${escape(ref)} · Page 1/1</div>
          </div>
        </article>
      `;
      // Allow the doc to settle, then open the print dialog if ?print=1.
      if (getParam("print") === "1") {
        setTimeout(() => window.print(), 400);
      }
    }

    // masriva-data.jsx loads as text/babel and assigns to window asynchronously.
    // Poll briefly for window.BOOKINGS being ready before rendering.
    let _tries = 0;
    function _attempt() {
      if (window.BOOKINGS) { renderVoucher(); return; }
      if (++_tries > 80) { renderEmpty("Data layer didn't load. Try refreshing."); return; }
      setTimeout(_attempt, 50);
    }
    _attempt();
  </script>
</body>
</html>
